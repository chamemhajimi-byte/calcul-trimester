<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My first calculater</title>
    <link rel="stylesheet" href="style cal.css" />
  </head>
  <body>
    <div class="calculator">
        <h1 class="display1">My calculater</h1>
      <!-- شاشة العرض -->
      <input type="text" id="display" class="display" disabled value="0" />

      <div class="buttons">
        <!-- الصف الأول -->
        <button class="clear" onclick="clearDisplay()">AC</button>
        <button class="operator" onclick="addToDisplay('/')">/</button>
        <button class="operator" onclick="addToDisplay('*')">×</button>

        <!-- الصف الثاني -->
        <button onclick="addToDisplay('7')">7</button>
        <button onclick="addToDisplay('8')">8</button>
        <button onclick="addToDisplay('9')">9</button>
        <button class="operator" onclick="addToDisplay('-')">-</button>

        <!-- الصف الثالث -->
        <button onclick="addToDisplay('4')">4</button>
        <button onclick="addToDisplay('5')">5</button>
        <button onclick="addToDisplay('6')">6</button>
        <button class="operator" onclick="addToDisplay('+')">+</button>

        <!-- الصف الرابع -->
        <button onclick="addToDisplay('1')">1</button>
        <button onclick="addToDisplay('2')">2</button>
        <button onclick="addToDisplay('3')">3</button>
        <button class="operator" onclick="backspace()">⌫</button>
        <!-- الصف الأخير -->
        <button style="grid-column: span 2" onclick="addToDisplay('0')">
          0
        </button>
        <button onclick="addToDisplay('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
      </div>
    </div>
    <script src="javacal.js"></script>
  </body>
</html>
